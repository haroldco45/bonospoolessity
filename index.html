<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Liquidación Essity - Distrileco</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        .input-manual { 
            @apply border-2 border-blue-100 rounded-md px-3 py-2 w-full text-right font-bold text-blue-900 bg-white focus:border-blue-500 outline-none transition-all text-sm;
            min-width: 160px; 
        }
        .meta-label { @apply text-[10px] text-gray-500 block mb-1 font-semibold; }
        .part-tag { @apply text-[10px] text-blue-600 font-bold block mt-1; }
        .bono-val { @apply font-black text-green-700 block text-sm; }
        th { @apply whitespace-nowrap px-6 py-4; }
        td { @apply px-4 py-3; }
    </style>
</head>
<body class="bg-slate-100 p-6 font-sans text-xs text-slate-800">

    <div class="max-w-[1900px] mx-auto bg-white p-8 rounded-2xl shadow-2xl border border-gray-200">
        <div class="flex flex-col md:flex-row justify-between items-center mb-8 border-b pb-6 gap-4">
            <div>
                <h1 class="text-4xl font-black text-blue-900 uppercase italic tracking-tighter">Liquidación Bonus Pool Essity</h1>
                <p class="text-slate-500 font-bold text-sm uppercase">✅ WhatsApp Optimizado / Excel sin "Revoltura"</p>
            </div>
            <div class="flex gap-4">
                <button onclick="limpiarDatos()" class="bg-red-500 hover:bg-red-600 text-white px-6 py-3 rounded-xl font-bold shadow-lg transition-all text-sm uppercase">🗑️ Borrar</button>
                <button onclick="exportarExcelLimpio()" class="bg-green-600 hover:bg-green-700 text-white px-8 py-3 rounded-xl font-bold shadow-lg transition-all uppercase tracking-wider text-sm">📥 Excel Limpio</button>
                <button onclick="enviarWhatsAppResumido()" class="bg-emerald-500 hover:bg-emerald-600 text-white px-8 py-3 rounded-xl font-bold shadow-lg transition-all uppercase tracking-wider text-sm">💬 Enviar WhatsApp</button>
            </div>
        </div>

        <div class="overflow-x-auto">
            <table id="tablaLiquidacion" class="w-full border-collapse border border-gray-200 shadow-sm">
                <thead>
                    <tr class="bg-slate-900 text-white text-[11px] uppercase tracking-widest text-center">
                        <th class="border border-slate-700">Vendedor</th>
                        <th class="border border-slate-700 bg-yellow-600">Avance Baby</th>
                        <th class="border border-slate-700 bg-sky-600">Avance Family</th>
                        <th class="border border-slate-700 bg-pink-600">Avance Fem</th>
                        <th class="border border-slate-700 bg-slate-800">Total Venta</th>
                        <th class="border border-slate-700 bg-slate-800">Falta ($)</th>
                        <th class="border border-slate-700 bg-slate-800">% Cumpl.</th>
                        <th class="border border-green-800 bg-green-900">Bono Baby</th>
                        <th class="border border-green-800 bg-green-900">Bono Family</th>
                        <th class="border border-green-800 bg-green-900">Bono Fem</th>
                        <th class="border border-green-800 bg-green-900">Bono Global</th>
                        <th class="border border-black bg-black text-base font-black text-green-400">TOTAL A PAGAR</th>
                    </tr>
                </thead>
                <tbody id="vendedoresBody" class="bg-white text-sm"></tbody>
                <tfoot class="bg-slate-900 text-white font-black text-right uppercase">
                    <tr class="text-sm">
                        <td class="border border-slate-700 text-center py-6 uppercase">Totales Empresa</td>
                        <td class="border border-slate-700" id="t-b">$0</td>
                        <td class="border border-slate-700" id="t-fam">$0</td>
                        <td class="border border-slate-700" id="t-fem">$0</td>
                        <td class="border border-slate-700 text-blue-400" id="t-venta">$0</td>
                        <td colspan="2" class="border border-slate-700 text-center" id="status-global">Calculando...</td>
                        <td class="border border-slate-700 text-green-400" id="b-b">$0</td>
                        <td class="border border-slate-700 text-green-400" id="b-fam">$0</td>
                        <td class="border border-slate-700 text-green-400" id="b-fem">$0</td>
                        <td class="border border-indigo-400" id="b-glob-total">$0</td>
                        <td class="border border-green-400 text-2xl" id="b-gran-total">$0</td>
                    </tr>
                </tfoot>
            </table>
        </div>
    </div>

    <script>
        const vendedores = [
            { n: "JUAN CARLOS QUINTANA", b: 964810, fam: 14687055, fem: 10481367 },
            { n: "DANNY DE JESUS TRONCOSO", b: 503255, fam: 34595027, fem: 13258007 },
            { n: "REYES ALVAREZ ROY", b: 282121, fam: 9174259, fem: 7788633 },
            { n: "ARGENIS JOSE MEZA", b: 15993, fam: 4480188, fem: 12274279 },
            { n: "ALEXANDER SANCHEZ", b: 1393934, fam: 18358206, fem: 13036604 },
            { n: "LORENZO CASTELLAR", b: 230706, fam: 17098117, fem: 16133441 }
        ];

        const METAS_CAT = { b: 3390818, fam: 98392851, fem: 72972331, global: 174756000 };
        const BOLSAS = { b: 100000, fam: 125000, fem: 100000, global: 175000 };

        function init() {
            const body = document.getElementById('vendedoresBody');
            vendedores.forEach((v, i) => {
                const row = document.createElement('tr');
                row.className = "hover:bg-blue-50/50 border-b text-right transition-colors";
                row.innerHTML = `
                    <td class="p-4 font-bold text-slate-800 bg-slate-50 border text-left uppercase">${v.n}</td>
                    <td class="border bg-yellow-50/20"><span class="meta-label">Meta: ${v.b.toLocaleString()}</span><input type="number" id="in-b-${i}" class="input-manual in-b" oninput="calcular()"></td>
                    <td class="border bg-sky-50/20"><span class="meta-label">Meta: ${v.fam.toLocaleString()}</span><input type="number" id="in-fam-${i}" class="input-manual in-fam" oninput="calcular()"></td>
                    <td class="border bg-pink-50/20"><span class="meta-label">Meta: ${v.fem.toLocaleString()}</span><input type="number" id="in-fem-${i}" class="input-manual in-fem" oninput="calcular()"></td>
                    <td class="border font-black text-slate-700 row-total">$0</td>
                    <td class="border font-bold text-red-600 row-falta">$0</td>
                    <td class="border text-center font-black row-pct text-blue-700">0.0%</td>
                    <td class="border bg-green-50/40"><span class="bono-val b-baby">$0</span><span class="part-tag p-baby">Part: 0.0%</span></td>
                    <td class="border bg-green-50/40"><span class="bono-val b-fam">$0</span><span class="part-tag p-fam">Part: 0.0%</span></td>
                    <td class="border bg-green-50/40"><span class="bono-val b-fem">$0</span><span class="part-tag p-fem">Part: 0.0%</span></td>
                    <td class="border bg-indigo-50/40"><span class="bono-val b-glob">$0</span><span class="part-tag p-glob">Part: 0.0%</span></td>
                    <td class="border bg-green-100 font-black text-green-900 b-final">$0</td>
                `;
                body.appendChild(row);
            });
            cargarDatos(); 
        }

        function calcular() {
            const rows = document.querySelectorAll('#vendedoresBody tr');
            let totalesE = { b: 0, fam: 0, fem: 0, g: 0 };
            let log = [];
            let storageData = {};

            rows.forEach((row, i) => {
                const vb = Math.round(parseFloat(row.querySelector('.in-b').value)) || 0;
                const vfam = Math.round(parseFloat(row.querySelector('.in-fam').value)) || 0;
                const vfem = Math.round(parseFloat(row.querySelector('.in-fem').value)) || 0;
                
                storageData[`v_${i}_b`] = vb;
                storageData[`v_${i}_fam`] = vfam;
                storageData[`v_${i}_fem`] = vfem;

                const vt = vb + vfam + vfem;
                const metaI = vendedores[i].b + vendedores[i].fam + vendedores[i].fem;

                totalesE.b += vb; totalesE.fam += vfam; totalesE.fem += vfem; totalesE.g += vt;

                row.querySelector('.row-total').innerText = "$" + vt.toLocaleString();
                row.querySelector('.row-falta').innerText = "$" + Math.max(0, metaI - vt).toLocaleString();
                row.querySelector('.row-pct').innerText = ((vt / metaI) * 100).toFixed(1) + "%";

                log.push({ vb, vfam, vfem, vt, metaI, row,
                           aB: vb >= vendedores[i].b, aFam: vfam >= vendedores[i].fam, 
                           aFem: vfem >= vendedores[i].fem, aG: vt >= metaI });
            });

            localStorage.setItem('distrileco_essity_data', JSON.stringify(storageData));

            document.getElementById('t-b').innerText = "$" + totalesE.b.toLocaleString();
            document.getElementById('t-fam').innerText = "$" + totalesE.fam.toLocaleString();
            document.getElementById('t-fem').innerText = "$" + totalesE.fem.toLocaleString();
            document.getElementById('t-venta').innerText = "$" + totalesE.g.toLocaleString();

            const sumA = {
                b: log.reduce((acc, d) => d.aB ? acc + d.vb : acc, 0),
                fam: log.reduce((acc, d) => d.aFam ? acc + d.vfam : acc, 0),
                fem: log.reduce((acc, d) => d.aFem ? acc + d.vfem : acc, 0),
                global: log.reduce((acc, d) => d.aG ? acc + d.vt : acc, 0)
            };

            let bonosEmpresa = { b: 0, fam: 0, fem: 0, glob: 0, total: 0 };

            log.forEach(d => {
                const pB = (sumA.b > 0 && d.aB) ? d.vb / sumA.b : 0;
                const pFam = (sumA.fam > 0 && d.aFam) ? d.vfam / sumA.fam : 0;
                const pFem = (sumA.fem > 0 && d.aFem) ? d.vfem / sumA.fem : 0;
                const pGlob = (sumA.global > 0 && d.aG) ? d.vt / sumA.global : 0;

                const bB = (totalesE.b >= METAS_CAT.b) ? Math.round(pB * BOLSAS.b) : 0;
                const bFam = (totalesE.fam >= METAS_CAT.fam) ? Math.round(pFam * BOLSAS.fam) : 0;
                const bFem = (totalesE.fem >= METAS_CAT.fem) ? Math.round(pFem * BOLSAS.fem) : 0;
                const bGlob = (totalesE.g >= METAS_CAT.global) ? Math.round(pGlob * BOLSAS.global) : 0;

                d.row.querySelector('.b-baby').innerText = "$" + bB.toLocaleString();
                d.row.querySelector('.p-baby').innerText = "Part: " + (pB * 100).toFixed(1) + "%";
                d.row.querySelector('.b-fam').innerText = "$" + bFam.toLocaleString();
                d.row.querySelector('.p-fam').innerText = "Part: " + (pFam * 100).toFixed(1) + "%";
                d.row.querySelector('.b-fem').innerText = "$" + bFem.toLocaleString();
                d.row.querySelector('.p-fem').innerText = "Part: " + (pFem * 100).toFixed(1) + "%";
                d.row.querySelector('.b-glob').innerText = "$" + bGlob.toLocaleString();
                d.row.querySelector('.p-glob').innerText = "Part: " + (pGlob * 100).toFixed(1) + "%";

                const total = bB + bFam + bFem + bGlob;
                d.row.querySelector('.b-final').innerText = "$" + total.toLocaleString();
                bonosEmpresa.total += total;
                bonosEmpresa.b += bB; bonosEmpresa.fam += bFam; bonosEmpresa.fem += bFem; bonosEmpresa.glob += bGlob;
            });

            document.getElementById('b-b').innerText = "$" + bonosEmpresa.b.toLocaleString();
            document.getElementById('b-family').innerText = "$" + bonosEmpresa.fam.toLocaleString();
            document.getElementById('b-fem').innerText = "$" + bonosEmpresa.fem.toLocaleString();
            document.getElementById('b-glob-total').innerText = "$" + bonosEmpresa.glob.toLocaleString();
            document.getElementById('b-gran-total').innerText = "$" + bonosEmpresa.total.toLocaleString();

            const st = document.getElementById('status-global');
            st.innerText = totalesE.g >= METAS_CAT.global ? "CUMPLIDA ✅" : "PENDIENTE ❌";
            st.className = totalesE.g >= METAS_CAT.global ? "border border-slate-700 bg-green-600 text-white text-center py-2" : "border border-slate-700 bg-red-600 text-white text-center py-2";
        }

        function cargarDatos() {
            const saved = localStorage.getItem('distrileco_essity_data');
            if (saved) {
                const data = JSON.parse(saved);
                vendedores.forEach((_, i) => {
                    if(data[`v_${i}_b`] !== undefined) document.getElementById(`in-b-${i}`).value = data[`v_${i}_b`];
                    if(data[`v_${i}_fam`] !== undefined) document.getElementById(`in-fam-${i}`).value = data[`v_${i}_fam`];
                    if(data[`v_${i}_fem`] !== undefined) document.getElementById(`in-fem-${i}`).value = data[`v_${i}_fem`];
                });
                calcular();
            }
        }

        function exportarExcelLimpio() {
            const clean = (val) => {
                if (!val) return 0;
                let text = val.innerText || val;
                // EXCLUSIÓN: Solo toma los números, ignora el resto
                let cleanVal = text.replace(/Meta:|Part:|\$|\.|%|\s/g, '').replace(',', '.');
                return isNaN(parseFloat(cleanVal)) ? text : parseFloat(cleanVal);
            };

            const dataExcel = [
                ["Vendedor", "Venta Baby", "Venta Family", "Venta Fem", "Total Venta", "Falta", "% Cumpl", "Bono Baby", "Bono Family", "Bono Fem", "Bono Global", "TOTAL PAGAR"]
            ];

            const rows = document.querySelectorAll('#vendedoresBody tr');
            rows.forEach((row, i) => {
                dataExcel.push([
                    row.cells[0].innerText,
                    parseFloat(row.querySelector('.in-b').value) || 0,
                    parseFloat(row.querySelector('.in-fam').value) || 0,
                    parseFloat(row.querySelector('.in-fem').value) || 0,
                    clean(row.querySelector('.row-total')),
                    clean(row.querySelector('.row-falta')),
                    clean(row.querySelector('.row-pct')) / 100,
                    clean(row.querySelector('.b-baby')),
                    clean(row.querySelector('.b-fam')),
                    clean(row.querySelector('.b-fem')),
                    clean(row.querySelector('.b-glob')),
                    clean(row.querySelector('.b-final'))
                ]);
            });

            const ws = XLSX.utils.aoa_to_sheet(dataExcel);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "Sheet1");
            XLSX.writeFile(wb, "Reporte_Essity_Limpio.xlsx");
        }

        function enviarWhatsAppResumido() {
            // Mensaje corto para evitar errores de enlace
            let t = "*BONOS ESSITY - DISTRILECO*%0A";
            t += "--------------------------%0A";
            const rows = document.querySelectorAll('#vendedoresBody tr');
            let hayBonos = false;

            vendedores.forEach((v, i) => {
                const total = document.querySelectorAll('.b-final')[i].innerText;
                const pct = document.querySelectorAll('.row-pct')[i].innerText;
                
                // Solo enviar los que tienen bono para ahorrar espacio
                if(total !== "$0") {
                    hayBonos = true;
                    t += `👤 *${v.n}*%0A💰 Bono: *${total}* (${pct})%0A`;
                }
            });

            if(!hayBonos) t += "No hay bonos liquidados aún.";
            
            t += "--------------------------%0A";
            t += "*Total Empresa:* " + document.getElementById('b-gran-total').innerText;

            window.open(`https://wa.me/573117700431?text=${t}`, '_blank');
        }

        function limpiarDatos() {
            if (confirm("¿Borrar todo?")) {
                localStorage.removeItem('distrileco_essity_data');
                location.reload();
            }
        }

        window.onload = init;
    </script>
</body>
</html>
