<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Liquidación Essity - Distrileco (Diseño Pro)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        /* CAJONES BLANCOS RESALTADOS PARA QUE NO SE VEA APELLUZCADO */
        .input-manual { 
            @apply border-2 rounded-lg px-3 py-2 w-full text-right font-black text-slate-900 bg-white shadow-md outline-none transition-all text-sm mb-1;
            min-width: 160px; 
        }
        /* Colores de borde para identificar cada categoría rápido */
        .in-b { border-color: #facc15; } /* Amarillo */
        .in-fam { border-color: #38bdf8; } /* Azul */
        .in-fem { border-color: #f472b6; } /* Rosado */
        
        .input-manual:focus { @apply ring-4 ring-slate-900 ring-opacity-20; }
        
        .meta-label { @apply text-[10px] text-slate-600 block mb-1 font-bold uppercase tracking-tighter; }
        .part-tag { @apply text-[9px] text-blue-600 font-bold block mt-1 bg-blue-50 px-1 rounded; }
        .bono-val { @apply font-black text-green-700 block text-sm; }
        
        th { @apply whitespace-nowrap px-4 py-3 text-[10px] font-black uppercase tracking-widest; }
        td { @apply px-3 py-4 border-r border-slate-100; }
        
        /* Diferencia visual de fondo entre entrada y salida */
        .seccion-ingreso { background-color: #f1f5f9; } /* Gris azulado suave */
        .seccion-resultado { background-color: #ffffff; }
    </style>
</head>
<body class="bg-slate-300 p-4 md:p-8 font-sans text-xs text-slate-800">

    <div class="max-w-[1950px] mx-auto bg-white p-8 rounded-3xl shadow-[0_25px_60px_rgba(0,0,0,0.3)] border border-slate-400">
        
        <div class="flex flex-col lg:flex-row justify-between items-center mb-10 pb-8 border-b-2 border-slate-100 gap-6">
            <div class="text-center lg:text-left">
                <h1 class="text-4xl font-black text-slate-900 uppercase italic tracking-tighter leading-none">Liquidación Bonus Pool <span class="text-blue-700">Essity</span></h1>
                <p class="text-slate-500 font-bold text-sm mt-2 uppercase tracking-widest">💾 Autoguardado Activo | Distrileco S.A.S</p>
            </div>
            <div class="flex flex-wrap gap-4 justify-center">
                <button onclick="limpiarDatos()" class="bg-rose-600 hover:bg-rose-700 text-white px-6 py-3 rounded-2xl font-black shadow-lg transition-all transform hover:-translate-y-1 active:scale-95 uppercase text-xs">🗑️ Borrar</button>
                <button onclick="exportarExcelLimpio()" class="bg-emerald-600 hover:bg-emerald-700 text-white px-8 py-3 rounded-2xl font-black shadow-lg transition-all transform hover:-translate-y-1 active:scale-95 uppercase text-xs">📥 Descargar Excel</button>
                <button onclick="enviarWhatsAppResumido()" class="bg-green-500 hover:bg-green-600 text-white px-8 py-3 rounded-2xl font-black shadow-lg transition-all transform hover:-translate-y-1 active:scale-95 uppercase text-xs">💬 Enviar WhatsApp</button>
            </div>
        </div>

        <div class="overflow-x-auto rounded-2xl border-2 border-slate-200 shadow-inner">
            <table id="tablaLiquidacion" class="w-full border-collapse">
                <thead>
                    <tr class="bg-slate-900 text-white text-center">
                        <th class="border-r border-slate-700">Vendedor</th>
                        <th class="bg-yellow-500 text-slate-900 border-r border-yellow-600">Avance H. Baby</th>
                        <th class="bg-sky-500 text-slate-900 border-r border-sky-600">Avance Family</th>
                        <th class="bg-pink-500 text-slate-900 border-r border-pink-600">Avance Fem.</th>
                        <th class="bg-slate-800 border-r border-slate-700 text-white">Total Venta</th>
                        <th class="bg-slate-800 border-r border-slate-700 text-white">Falta ($)</th>
                        <th class="bg-slate-800 border-r border-slate-700 text-white">% Cumpl.</th>
                        <th class="bg-green-700 border-r border-green-800 text-white">Bono Baby</th>
                        <th class="bg-green-700 border-r border-green-800 text-white">Bono Family</th>
                        <th class="bg-green-700 border-r border-green-800 text-white">Bono Fem.</th>
                        <th class="bg-green-700 border-r border-green-800 text-white">Bono Global</th>
                        <th class="bg-green-900 font-black text-green-300">PAGO TOTAL</th>
                    </tr>
                </thead>
                <tbody id="vendedoresBody" class="text-sm"></tbody>
                <tfoot class="bg-slate-900 text-white font-black text-right uppercase">
                    <tr>
                        <td class="p-6 border-r border-slate-700 text-center text-lg">Totales Empresa</td>
                        <td class="p-6 border-r border-slate-700 text-yellow-400 text-lg" id="t-b">$0</td>
                        <td class="p-6 border-r border-slate-700 text-sky-400 text-lg" id="t-fam">$0</td>
                        <td class="p-6 border-r border-slate-700 text-pink-400 text-lg" id="t-fem">$0</td>
                        <td class="p-6 border-r border-slate-700 text-white bg-slate-800" id="t-venta">$0</td>
                        <td colspan="2" class="p-6 border-r border-slate-700 text-center" id="status-global">Calculando...</td>
                        <td class="p-6 border-r border-slate-700 text-green-400" id="b-b">$0</td>
                        <td class="p-6 border-r border-slate-700 text-green-400" id="b-fam">$0</td>
                        <td class="p-6 border-r border-slate-700 text-green-400" id="b-fem">$0</td>
                        <td class="p-6 border-r border-slate-700 text-green-400" id="b-glob-total">$0</td>
                        <td class="p-6 bg-green-900 text-green-300 text-4xl" id="b-gran-total">$0</td>
                    </tr>
                </tfoot>
            </table>
        </div>
    </div>

    <script>
        const vendedores = [
            { n: "JUAN CARLOS QUINTANA", b: 964810, fam: 14687055, fem: 10481367 },
            { n: "DANNY DE JESUS TRONCOSO", b: 503255, fam: 34595027, fem: 13258007 },
            { n: "REYES ALVAREZ ROY", b: 282121, fam: 9174259, fem: 7788633 },
            { n: "ARGENIS JOSE MEZA", b: 15993, fam: 4480188, fem: 12274279 },
            { n: "ALEXANDER SANCHEZ", b: 1393934, fam: 18358206, fem: 13036604 },
            { n: "LORENZO CASTELLAR", b: 230706, fam: 17098117, fem: 16133441 }
        ];

        const METAS_CAT = { b: 3390818, fam: 98392851, fem: 72972331, global: 174756000 };
        const BOLSAS = { b: 100000, fam: 125000, fem: 100000, global: 175000 };

        function init() {
            const body = document.getElementById('vendedoresBody');
            vendedores.forEach((v, i) => {
                const row = document.createElement('tr');
                row.className = "border-b border-slate-200 text-right";
                row.innerHTML = `
                    <td class="p-4 font-black text-slate-800 bg-slate-100 border-r border-slate-200 text-left uppercase text-xs">${v.n}</td>
                    <td class="seccion-ingreso border-r"><span class="meta-label">Meta: ${Math.round(v.b).toLocaleString()}</span><input type="number" id="in-b-${i}" class="input-manual in-b" oninput="calcular()"></td>
                    <td class="seccion-ingreso border-r"><span class="meta-label">Meta: ${Math.round(v.fam).toLocaleString()}</span><input type="number" id="in-fam-${i}" class="input-manual in-fam" oninput="calcular()"></td>
                    <td class="seccion-ingreso border-r"><span class="meta-label">Meta: ${Math.round(v.fem).toLocaleString()}</span><input type="number" id="in-fem-${i}" class="input-manual in-fem" oninput="calcular()"></td>
                    
                    <td class="seccion-resultado border-r font-black text-slate-700 row-total">$0</td>
                    <td class="seccion-resultado border-r font-bold text-rose-600 row-falta">$0</td>
                    <td class="seccion-resultado border-r text-center font-black row-pct text-blue-900 text-base">0.0%</td>

                    <td class="seccion-resultado border-r bg-green-50/50"><span class="bono-val b-baby">$0</span><span class="part-tag p-baby">Part: 0.0%</span></td>
                    <td class="seccion-resultado border-r bg-green-50/50"><span class="bono-val b-fam">$0</span><span class="part-tag p-fam">Part: 0.0%</span></td>
                    <td class="seccion-resultado border-r bg-green-50/50"><span class="bono-val b-fem">$0</span><span class="part-tag p-fem">Part: 0.0%</span></td>
                    <td class="seccion-resultado border-r bg-green-50/50"><span class="bono-val text-indigo-700 b-glob">$0</span><span class="part-tag p-glob">Part: 0.0%</span></td>
                    <td class="bg-green-100 font-black text-green-900 text-base b-final text-lg">$0</td>
                `;
                body.appendChild(row);
            });
            cargarDatos(); 
        }

        function calcular() {
            const rows = document.querySelectorAll('#vendedoresBody tr');
            let totalesE = { b: 0, fam: 0, fem: 0, g: 0 };
            let log = [];
            let storageData = {};

            rows.forEach((row, i) => {
                const vb = Math.round(parseFloat(row.querySelector('.in-b').value)) || 0;
                const vfam = Math.round(parseFloat(row.querySelector('.in-fam').value)) || 0;
                const vfem = Math.round(parseFloat(row.querySelector('.in-fem').value)) || 0;
                
                storageData[`v_${i}_b`] = vb;
                storageData[`v_${i}_fam`] = vfam;
                storageData[`v_${i}_fem`] = vfem;

                const vt = vb + vfam + vfem;
                const metaI = vendedores[i].b + vendedores[i].fam + vendedores[i].fem;

                totalesE.b += vb; totalesE.fam += vfam; totalesE.fem += vfem; totalesE.g += vt;

                row.querySelector('.row-total').innerText = "$" + vt.toLocaleString();
                row.querySelector('.row-falta').innerText = "$" + Math.max(0, Math.round(metaI - vt)).toLocaleString();
                row.querySelector('.row-pct').innerText = ((vt / metaI) * 100).toFixed(1) + "%";

                log.push({ vb, vfam, vfem, vt, metaI, row,
                           aB: vb >= vendedores[i].b, aFam: vfam >= vendedores[i].fam, 
                           aFem: vfem >= vendedores[i].fem, aG: vt >= metaI });
            });

            localStorage.setItem('distrileco_essity_data', JSON.stringify(storageData));

            document.getElementById('t-b').innerText = "$" + totalesE.b.toLocaleString();
            document.getElementById('t-fam').innerText = "$" + totalesE.fam.toLocaleString();
            document.getElementById('t-fem').innerText = "$" + totalesE.fem.toLocaleString();
            document.getElementById('t-venta').innerText = "$" + totalesE.g.toLocaleString();

            const sumA = {
                b: log.reduce((acc, d) => d.aB ? acc + d.vb : acc, 0),
                fam: log.reduce((acc, d) => d.aFam ? acc + d.vfam : acc, 0),
                fem: log.reduce((acc, d) => d.aFem ? acc + d.vfem : acc, 0),
                global: log.reduce((acc, d) => d.aG ? acc + d.vt : acc, 0)
            };

            let bonosEmpresa = { b: 0, fam: 0, fem: 0, glob: 0, total: 0 };

            log.forEach(d => {
                const pB = (sumA.b > 0 && d.aB) ? d.vb / sumA.b : 0;
                const pFam = (sumA.fam > 0 && d.aFam) ? d.vfam / sumA.fam : 0;
                const pFem = (sumA.fem > 0 && d.aFem) ? d.vfem / sumA.fem : 0;
                const pGlob = (sumA.global > 0 && d.aG) ? d.vt / sumA.global : 0;

                const bB = (totalesE.b >= METAS_CAT.b) ? Math.round(pB * BOLSAS.b) : 0;
                const bFam = (totalesE.fam >= METAS_CAT.fam) ? Math.round(pFam * BOLSAS.fam) : 0;
                const bFem = (totalesE.fem >= METAS_CAT.fem) ? Math.round(pFem * BOLSAS.fem) : 0;
                const bGlob = (totalesE.g >= METAS_CAT.global) ? Math.round(pGlob * BOLSAS.global) : 0;

                d.row.querySelector('.b-baby').innerText = "$" + bB.toLocaleString();
                d.row.querySelector('.p-baby').innerText = "Part: " + (pB * 100).toFixed(1) + "%";
                d.row.querySelector('.b-fam').innerText = "$" + bFam.toLocaleString();
                d.row.querySelector('.p-fam').innerText = "Part: " + (pFam * 100).toFixed(1) + "%";
                d.row.querySelector('.b-fem').innerText = "$" + bFem.toLocaleString();
                d.row.querySelector('.p-fem').innerText = "Part: " + (pFem * 100).toFixed(1) + "%";
                d.row.querySelector('.b-glob').innerText = "$" + bGlob.toLocaleString();
                d.row.querySelector('.p-glob').innerText = "Part: " + (pGlob * 100).toFixed(1) + "%";

                const total = bB + bFam + bFem + bGlob;
                d.row.querySelector('.b-final').innerText = "$" + total.toLocaleString();
                bonosEmpresa.total += total;
                bonosEmpresa.b += bB; bonosEmpresa.fam += bFam; bonosEmpresa.fem += bFem; bonosEmpresa.glob += bGlob;
            });

            document.getElementById('b-b').innerText = "$" + bonosEmpresa.b.toLocaleString();
            document.getElementById('b-family').innerText = "$" + bonosEmpresa.fam.toLocaleString();
            document.getElementById('b-fem').innerText = "$" + bonosEmpresa.fem.toLocaleString();
            document.getElementById('b-glob-total').innerText = "$" + bonosEmpresa.glob.toLocaleString();
            document.getElementById('b-gran-total').innerText = "$" + bonosEmpresa.total.toLocaleString();

            const st = document.getElementById('status-global');
            st.innerText = totalesE.g >= METAS_CAT.global ? "CUMPLIDA ✅" : "PENDIENTE ❌";
            st.className = totalesE.g >= METAS_CAT.global ? "border border-slate-700 bg-green-600 text-white text-center py-4 text-sm" : "border border-slate-700 bg-rose-600 text-white text-center py-4 text-sm";
        }

        function cargarDatos() {
            const saved = localStorage.getItem('distrileco_essity_data');
            if (saved) {
                const data = JSON.parse(saved);
                vendedores.forEach((_, i) => {
                    if(data[`v_${i}_b`] !== undefined) document.getElementById(`in-b-${i}`).value = data[`v_${i}_b`];
                    if(data[`v_${i}_fam`] !== undefined) document.getElementById(`in-fam-${i}`).value = data[`v_${i}_fam`];
                    if(data[`v_${i}_fem`] !== undefined) document.getElementById(`in-fem-${i}`).value = data[`v_${i}_fem`];
                });
                calcular();
            }
        }

        function exportarExcelLimpio() {
            const clean = (val) => {
                if (!val) return 0;
                let text = val.innerText || val;
                let cleanVal = text.replace(/Meta:|Part:|\$|\.|%|\s/g, '').replace(',', '.');
                return isNaN(parseFloat(cleanVal)) ? text : parseFloat(cleanVal);
            };

            const dataExcel = [
                ["Vendedor", "Venta Baby", "Venta Family", "Venta Fem", "Total Venta", "Falta", "% Cumpl", "Bono Baby", "Bono Family", "Bono Fem", "Bono Global", "TOTAL PAGAR"]
            ];

            const rows = document.querySelectorAll('#vendedoresBody tr');
            rows.forEach((row, i) => {
                dataExcel.push([
                    row.cells[0].innerText,
                    parseFloat(document.getElementById(`in-b-${i}`).value) || 0,
                    parseFloat(document.getElementById(`in-fam-${i}`).value) || 0,
                    parseFloat(document.getElementById(`in-fem-${i}`).value) || 0,
                    clean(row.querySelector('.row-total')),
                    clean(row.querySelector('.row-falta')),
                    clean(row.querySelector('.row-pct')) / 100,
                    clean(row.querySelector('.b-baby')),
                    clean(row.querySelector('.b-fam')),
                    clean(row.querySelector('.b-fem')),
                    clean(row.querySelector('.b-glob')),
                    clean(row.querySelector('.b-final'))
                ]);
            });

            const ws = XLSX.utils.aoa_to_sheet(dataExcel);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "Sheet1");
            XLSX.writeFile(wb, "Reporte_Essity_Final.xlsx");
        }

        function enviarWhatsAppResumido() {
            let t = "*BONOS ESSITY - DISTRILECO*%0A%0A";
            const rows = document.querySelectorAll('#vendedoresBody tr');
            vendedores.forEach((v, i) => {
                const total = document.querySelectorAll('.b-final')[i].innerText;
                const pct = document.querySelectorAll('.row-pct')[i].innerText;
                if(total !== "$0") t += `👤 *${v.n}*%0A💰 Bono: *${total}* (${pct})%0A---%0A`;
            });
            t += "%0A*PAGO TOTAL:* " + document.getElementById('b-gran-total').innerText;
            window.open(`https://wa.me/573117700431?text=${t}`, '_blank');
        }

        function limpiarDatos() {
            if (confirm("¿Borrar todos los datos ingresados?")) {
                localStorage.removeItem('distrileco_essity_data');
                location.reload();
            }
        }

        window.onload = init;
    </script>
</body>
</html>
